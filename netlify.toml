[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"

[[scheduled.functions]]
  name = "fetch-news"
  schedule = "0 */6 * * *"

[context.production.environment]
  REACT_APP_API_URL = "https://api.example.com"
  NODE_ENV = "production"